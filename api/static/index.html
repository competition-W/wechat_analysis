<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>客户服务数据看板</title>
<style>
:root{--bg:#f4f6f8;--surface:#fff;--text:#17202a;--muted:#667085;--line:#dfe3e8;--brand:#176b5b;--brand-soft:#e7f2ef;--blue:#2563a8;--warn:#a15c00;--danger:#b42318;--radius:7px;--shadow:0 1px 3px rgba(16,24,40,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 Inter,"Segoe UI","Microsoft YaHei",sans-serif;letter-spacing:0}button{font:inherit}.shell{max-width:1440px;margin:auto;padding:0 24px 40px}.topbar{background:#123b36;color:#fff}.topbar-inner{max-width:1440px;margin:auto;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:20px}.brand h1{font-size:20px;margin:0 0 3px}.brand p{margin:0;color:#c4d8d4;font-size:12px}.actions{display:flex;align-items:center;gap:10px}.status{display:flex;align-items:center;gap:7px;color:#d6e5e2;font-size:12px}.dot{width:8px;height:8px;border-radius:50%;background:#f0b429}.dot.ok{background:#42c998}.dot.error{background:#ff6b62}.icon-btn{width:40px;height:40px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;border-radius:6px;cursor:pointer;font-size:20px}.icon-btn:hover{background:rgba(255,255,255,.1)}.icon-btn:focus-visible,.retry:focus-visible{outline:3px solid #82cbbd;outline-offset:2px}.summary-line{margin:18px 0 12px;display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:12px}.kpis{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:10px}.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);min-height:98px}.kpi strong{display:block;font-size:25px;line-height:1.2;margin:5px 0}.kpi span{color:var(--muted);font-size:12px}.section-title{margin:28px 0 10px;display:flex;align-items:end;justify-content:space-between}.section-title h2{font-size:16px;margin:0}.section-title p{font-size:12px;color:var(--muted);margin:0}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);min-height:270px;overflow:hidden}.panel.wide{grid-column:1/-1}.panel-head{height:52px;padding:0 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.panel-head h3{font-size:14px;margin:0}.panel-head small{color:var(--muted)}.panel-body{padding:16px;min-height:216px}.state{min-height:184px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--muted);gap:8px}.spinner{width:22px;height:22px;border:2px solid #d7dfdd;border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}.state strong{color:var(--text)}.state p{margin:0;max-width:440px;font-size:12px}.request-id{font-family:Consolas,monospace;color:#7b8490}.retry{border:1px solid var(--line);background:#fff;border-radius:5px;padding:7px 12px;cursor:pointer;color:var(--brand)}.retry:hover{background:var(--brand-soft)}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;color:var(--muted);font-weight:600;background:#f8fafb}th,td{padding:9px 10px;border-bottom:1px solid #edf0f2}tr:last-child td{border-bottom:0}.num{font-variant-numeric:tabular-nums;font-weight:600}.bar-list{display:grid;gap:10px}.bar-row{display:grid;grid-template-columns:minmax(80px,150px) 1fr 55px;gap:10px;align-items:center;font-size:12px}.bar-track{height:8px;background:#edf1f2;border-radius:3px;overflow:hidden}.bar-fill{height:100%;background:var(--brand)}.bar-fill.blue{background:var(--blue)}.pill{display:inline-block;padding:2px 7px;border-radius:10px;background:var(--brand-soft);color:var(--brand);font-size:11px}.risk{color:var(--danger)}.footer{margin-top:24px;border-top:1px solid var(--line);padding-top:14px;color:var(--muted);font-size:11px}.skeleton{height:15px;border-radius:3px;background:linear-gradient(90deg,#eef1f3 25%,#f8f9fa 37%,#eef1f3 63%);background-size:400% 100%;animation:shine 1.4s ease infinite;margin:10px 0}.skeleton:nth-child(2){width:82%}.skeleton:nth-child(3){width:65%}@keyframes spin{to{transform:rotate(360deg)}}@keyframes shine{to{background-position:-100% 0}}@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:1fr}.panel.wide{grid-column:auto}}@media(max-width:560px){.shell,.topbar-inner{padding-left:14px;padding-right:14px}.brand p{display:none}.kpis{grid-template-columns:repeat(2,1fr)}.summary-line{flex-direction:column}.section-title{align-items:start;flex-direction:column}.bar-row{grid-template-columns:90px 1fr 45px}}
@media(prefers-reduced-motion:reduce){.spinner,.skeleton{animation:none}}
</style>
</head>
<body>
<header class="topbar"><div class="topbar-inner"><div class="brand"><h1>客户服务数据看板</h1><p>客户沟通、服务质量与业务覆盖概览</p></div><div class="actions"><div class="status"><span class="dot" id="healthDot"></span><span id="healthText">正在连接</span></div><button class="icon-btn" id="refreshBtn" title="刷新全部数据" aria-label="刷新全部数据">↻</button></div></div></header>
<main class="shell">
  <div class="summary-line"><span id="rangeText">正在获取统计范围</span><span id="updatedText">尚未完成加载</span></div>
  <section class="kpis" id="kpis" aria-label="核心指标"></section>
  <div class="section-title"><h2>服务表现</h2><p>关注响应质量、沟通活跃度与客户反馈</p></div>
  <section class="grid">
    <article class="panel"><div class="panel-head"><h3>未及时响应</h3><small>客户风险</small></div><div class="panel-body" id="unanswered"></div></article>
    <article class="panel"><div class="panel-head"><h3>客户与服务情绪</h3><small>近一年汇总</small></div><div class="panel-body" id="sentiment"></div></article>
    <article class="panel"><div class="panel-head"><h3>沟通活跃时段</h3><small>近 30 天</small></div><div class="panel-body" id="timeDistribution"></div></article>
    <article class="panel"><div class="panel-head"><h3>高频关注主题</h3><small>Top 12</small></div><div class="panel-body" id="highFreq"></div></article>
  </section>
  <div class="section-title"><h2>业务分布</h2><p>了解团队承接、区域覆盖与产品结构</p></div>
  <section class="grid">
    <article class="panel"><div class="panel-head"><h3>服务人员承接量</h3><small>按客户群统计</small></div><div class="panel-body" id="afterSaler"></div></article>
    <article class="panel"><div class="panel-head"><h3>销售区域覆盖</h3><small>按客户群统计</small></div><div class="panel-body" id="orgDistribution"></div></article>
    <article class="panel"><div class="panel-head"><h3>产品类别</h3><small>按项目统计</small></div><div class="panel-body" id="products"></div></article>
    <article class="panel"><div class="panel-head"><h3>重点客户</h3><small>按客户层级统计</small></div><div class="panel-body" id="accounts"></div></article>
  </section>
  <div class="footer">数据为空时会显示具体原因；请求失败或超时后可在卡片内重试。页面请求编号与服务日志中的 id 一致。</div>
</main>
<script>
(function(){
'use strict';
var TIMEOUT_MS=15000;
var requests={
 summary:{url:'/api/v1/dashboard/full-summary',target:'kpis'},
 unanswered:{url:'/api/v1/dashboard/unanswered-summary',target:'unanswered'},
 sentiment:{url:'/api/v1/dashboard/sentiment-summary',target:'sentiment'},
 time:{url:'/api/v1/dashboard/time-distribution?days=30',target:'timeDistribution'},
 words:{url:'/api/v1/dashboard/high-freq?limit=12',target:'highFreq'},
 people:{url:'/api/v1/dashboard/after-saler-distribution',target:'afterSaler'},
 orgs:{url:'/api/v1/dashboard/org-distribution',target:'orgDistribution'},
 products:{url:'/api/v1/dashboard/product-categories',target:'products'},
 accounts:{url:'/api/v1/dashboard/key-accounts',target:'accounts'}
};
function el(id){return document.getElementById(id)}
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function fmt(v){return Number(v||0).toLocaleString('zh-CN')}
function loading(target){el(target).innerHTML='<div class="state"><div class="spinner"></div><strong>正在读取数据</strong><p>已发出请求，超过 15 秒将自动停止并显示超时原因。</p></div>'}
function empty(target,msg){el(target).innerHTML='<div class="state"><strong>暂无可展示数据</strong><p>'+esc(msg||'当前筛选范围内没有记录。')+'</p></div>'}
function failure(target,key,error){var timeout=error.name==='AbortError';var id=error.requestId||'-';el(target).innerHTML='<div class="state"><strong>'+(timeout?'请求超时':'数据加载失败')+'</strong><p>'+(timeout?'服务在 15 秒内未返回，可能正在执行慢查询或数据库连接不可用。':esc(error.message))+'</p><span class="request-id">请求编号: '+esc(id)+'</span><button class="retry" data-retry="'+key+'">重试</button></div>'}
async function api(spec){var controller=new AbortController();var requestId='web-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7);var timer=setTimeout(function(){controller.abort()},TIMEOUT_MS);try{var response=await fetch(spec.url,{signal:controller.signal,headers:{'X-Request-ID':requestId}});var serverId=response.headers.get('X-Request-ID')||requestId;var json;try{json=await response.json()}catch(e){throw new Error('服务返回了无法解析的响应（HTTP '+response.status+'）')}if(!response.ok)throw new Error((json&&json.detail)||('HTTP '+response.status));if(json.code!==0)throw new Error(json.message||'接口返回失败');return json.data}catch(e){e.requestId=requestId;throw e}finally{clearTimeout(timer)}}
function bars(target,items,label,value,color){if(!items||!items.length){empty(target,'相关记录为空，或现有数据无法完成关联。');return}var max=Math.max.apply(null,items.map(value))||1;el(target).innerHTML='<div class="bar-list">'+items.slice(0,10).map(function(x){var n=value(x)||0;return'<div class="bar-row"><span title="'+esc(label(x))+'">'+esc(label(x))+'</span><div class="bar-track"><div class="bar-fill '+(color||'')+'" style="width:'+Math.max(2,n/max*100)+'%"></div></div><span class="num">'+fmt(n)+'</span></div>'}).join('')+'</div>'}
function renderSummary(d){var items=[['客户群',d.total_groups],['沟通消息',d.total_messages],['项目客户群',d.lc_groups],['服务人员',d.after_saler_count],['销售区域',d.org_count],['产品类别',d.product_category_count]];el('kpis').innerHTML=items.map(function(i){return'<div class="kpi"><span>'+i[0]+'</span><strong>'+fmt(i[1])+'</strong><span>当前统计范围</span></div>'}).join('');el('rangeText').textContent=d.date_range&&d.date_range!=='all'?'统计范围：'+d.date_range:'统计范围：全部历史数据'}
function renderUnanswered(d){var total=Number(d.total_groups||0);if(!total){empty('unanswered','尚无客户群分析记录。');return}el('unanswered').innerHTML='<div class="kpis" style="grid-template-columns:repeat(2,1fr)"><div class="kpi"><span>存在未响应</span><strong class="risk">'+fmt(d.missed_groups)+'</strong><span>'+fmt(d.missed_rate)+'% 的客户群</span></div><div class="kpi"><span>响应正常</span><strong>'+fmt(d.answered_groups)+'</strong><span>共 '+fmt(total)+' 个客户群</span></div></div>'}
function renderSentiment(d){bars('sentiment',[{n:'客户正向',v:d.customer_good},{n:'客户负向',v:d.customer_bad},{n:'服务正向',v:d.sale_positive},{n:'服务负向',v:d.sale_negative}],function(x){return x.n},function(x){return x.v},'blue')}
function renderTime(d){bars('timeDistribution',d.buckets||d.items,function(x){return x.label||x.range||x.name},function(x){return x.count})}
function renderWords(d){bars('highFreq',d.top_words,function(x){return x.word},function(x){return x.count},'blue')}
function renderPeople(d){bars('afterSaler',d.items,function(x){return x.name},function(x){return x.count})}
function renderOrgs(d){bars('orgDistribution',d.items,function(x){return x.region},function(x){return x.count},'blue')}
function renderProducts(d){bars('products',d.categories,function(x){return x.level1},function(x){return x.count})}
function renderAccounts(d){var rows=d.hierarchy||[];if(!rows.length){empty('accounts','未找到可关联的重点客户信息。请检查项目与客户资料的关联字段。');return}el('accounts').innerHTML='<table><thead><tr><th>重点客户</th><th>项目数</th><th>下属客户数</th></tr></thead><tbody>'+rows.slice(0,10).map(function(x){return'<tr><td>'+esc(x.key_account)+'</td><td class="num">'+fmt(x.total_projects)+'</td><td>'+fmt((x.customers||[]).length)+'</td></tr>'}).join('')+'</tbody></table>'}
var renderers={summary:renderSummary,unanswered:renderUnanswered,sentiment:renderSentiment,time:renderTime,words:renderWords,people:renderPeople,orgs:renderOrgs,products:renderProducts,accounts:renderAccounts};
async function load(key){var spec=requests[key];loading(spec.target);try{var data=await api(spec);renderers[key](data||{});return true}catch(e){failure(spec.target,key,e);return false}}
async function loadAll(){el('healthDot').className='dot';el('healthText').textContent='正在读取数据';Object.keys(requests).forEach(function(k){loading(requests[k].target)});var results=await Promise.all(Object.keys(requests).map(load));var ok=results.filter(Boolean).length;el('healthDot').className='dot '+(ok===results.length?'ok':'error');el('healthText').textContent=ok===results.length?'数据已更新':ok+' / '+results.length+' 项已加载';el('updatedText').textContent='最近更新：'+new Date().toLocaleString('zh-CN')}
document.addEventListener('click',function(e){var key=e.target.getAttribute('data-retry');if(key)load(key)});el('refreshBtn').addEventListener('click',loadAll);loadAll();
})();
</script>
</body>
</html>
